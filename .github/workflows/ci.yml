# CI — every PR and push to the default branch. (Starter kit: amattas/aviato/starter)
# Keep the job id `ci` — the branch ruleset requires a check context named "ci".
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        # cli extras included: the test suite imports pydmp.cli, which hard-exits
        # without click/pyyaml/rich.
        run: python -m pip install -e ".[dev,cli]"
      - name: Lint
        run: |
          ruff check .
          black --check --diff src tests
      - name: Test
        # --no-cov: pyproject addopts force coverage (+ an HTML report) on every
        # run — useful locally, wasted I/O in CI with no uploader.
        run: python -m pytest -q --no-cov
      - name: Build
        run: |
          python -m pip install --quiet build==1.5.0
          python -m build
