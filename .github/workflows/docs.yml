# Docs — build and deploy to GitHub Pages on every push to the default branch.
# Deliberately NOT tied to release tags: docs ship when they merge.
# (Starter kit docs-site/docs.yml + a pydoc-markdown step: the API reference is
# generated from docstrings at build time, replacing the old mkdocstrings pages.)
name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Generate API reference from docstrings
        run: |
          python -m pip install --quiet -e . "pydoc-markdown==4.8.2"
          mkdir -p website/docs/api
          {
            # mdx.format md: the generated body is plain markdown; docstring braces
            # like {area} are JSX expressions to MDX and break the static build.
            printf -- '---\ntitle: API Reference\nmdx:\n  format: md\n---\n\n'
            pydoc-markdown -I src -p pydmp
          } > website/docs/api/reference.md
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Build
        working-directory: website
        run: |
          npm ci
          npm run build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: website/build
      - uses: actions/deploy-pages@v5
        id: deployment
