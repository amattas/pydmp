# Docs — Zensical + mike (versioned), deployed to GitHub Pages.
#   push to main        → deploys the "dev" version
#   release published   → deploys "X.Y.Z" + updates the "latest" alias
#   workflow_dispatch   → deploys an explicit version (one-time seeding/fixups)
# mike stores every built version on the gh-pages branch; GitHub Pages serves
# that branch directly (Pages source = gh-pages, classic mike setup), so no
# artifact upload/deploy steps are needed here.
# The API reference is generated from docstrings at build time (pydoc-markdown).
name: Docs

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy (e.g. 1.0.1); aliases it as latest. Empty = dev."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write # mike commits versions to the gh-pages branch
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # mike needs the gh-pages branch history
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install docs tooling
        # mike: Zensical-compatible fork, not on PyPI yet — pinned by commit.
        # https://zensical.org/docs/setup/versioning/
        run: |
          python -m pip install --quiet ".[docs]" \
            "git+https://github.com/squidfunk/mike.git@2d4ad799442f4592db8ad53b179bfb33db8c69ac"
      - name: Generate API reference from docstrings
        run: |
          mkdir -p docs/api  # holds only this gitignored file, so absent in a fresh checkout
          {
            printf -- '---\ntitle: API Reference\n---\n\n'
            pydoc-markdown -I src -p pydmp
          } > docs/api/reference.md
      - name: Deploy version with mike
        env:
          EVENT: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          PRERELEASE: ${{ github.event.release.prerelease }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          case "${EVENT}" in
            release) VERSION="${RELEASE_TAG}" ;;
            workflow_dispatch) VERSION="${INPUT_VERSION}" ;;
            *) VERSION="" ;;
          esac
          if [ -z "${VERSION}" ]; then
            mike deploy --push dev
          elif [ "${PRERELEASE}" = "true" ]; then
            # alpha/beta: publish the version but don't move "latest"
            mike deploy --push "${VERSION}"
          else
            mike deploy --push --update-aliases "${VERSION}" latest
            mike set-default --push latest
          fi
